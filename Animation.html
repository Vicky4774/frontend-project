<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Animation</title>

	<style type="text/css">
		
	.box
	{
		width:20%;
		height: 200px;
		border: solid 2px black;
		background-color: red;
		animation-name: viki;
		animation-delay: 1s;
		animation-direction:inherit;
		animation-timing-function: 2s;
		animation-duration: 5s;
		border-radius: 10px;
	}
	
	@keyframes viki
	{

		0%
		{
			background-color:aqua;
			top: 0px;
			
		}

		25%
		{
			background-color:grey;
			margin-left: 500px;
			margin-top: 0px;
		}

		50%
		{
			background-color:orange;
			margin-left: 500px;
			margin-top: 500px;
			
		}
		75%
		{
			background-color:green;
			margin-left: 500px;
			margin-top: 500px;
		}
		100%
		{
			background-color:whitesmoke;
			margin-bottom: 500px;
			margin-top: 500px;
		}

	}


	</style>


</head>
<body>

	<div class="box">
		
	</div>

</body>
</html>
